name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      APP_PATH: ${{ secrets.APP_PATH }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ env.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Create deployment archive
        run: |
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=.next \
            --exclude=node_modules \
            --exclude=.env \
            --exclude=o2switch-build.zip \
            -czf deploy.tgz .

      - name: Upload archive
        run: |
          scp -P "${SSH_PORT:-22}" deploy.tgz "${SSH_USERNAME}@${SSH_HOST}:${APP_PATH}/deploy.tgz"

      - name: Deploy on server
        run: |
          ssh -p "${SSH_PORT:-22}" "${SSH_USERNAME}@${SSH_HOST}" "
            set -e
            cd '${APP_PATH}'
            tar -xzf deploy.tgz
            rm -f deploy.tgz
            /usr/bin/bash scripts/o2switch-deploy.sh
            mkdir -p tmp
            touch tmp/restart.txt
          "
