name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      APP_PATH: ${{ secrets.APP_PATH }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Create deployment archive
        run: |
          rm -f deploy.tar deploy.tgz
          git archive --format=tar --output=deploy.tar HEAD
          tar --delete --file=deploy.tar .github || true
          tar --delete --file=deploy.tar .env || true
          tar --delete --file=deploy.tar o2switch-build.zip || true
          gzip -f deploy.tar
          mv deploy.tar.gz deploy.tgz

      - name: Upload archive
        run: |
          scp \
            -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -P "${SSH_PORT:-22}" \
            deploy.tgz "${SSH_USERNAME}@${SSH_HOST}:${APP_PATH}/deploy.tgz"

      - name: Deploy on server
        run: |
          ssh \
            -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -p "${SSH_PORT:-22}" \
            "${SSH_USERNAME}@${SSH_HOST}" "
            set -e
            cd '${APP_PATH}'
            tar -xzf deploy.tgz
            rm -f deploy.tgz
            /usr/bin/bash scripts/o2switch-deploy.sh
            mkdir -p tmp
            touch tmp/restart.txt
          "
